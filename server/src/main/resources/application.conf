ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.kotlincrossplatform.nutrivox.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/nutrivox"
    url = ${?DATABASE_URL}
    user = "nutrivox"
    user = ${?DATABASE_USER}
    password = "nutrivox"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = "nutrivox-dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "nutrivox"
    audience = "nutrivox-app"
    realm = "Nutrivox"
    accessTokenExpiration = 3600000
    refreshTokenExpiration = 604800000
}

ai {
    provider = "anthropic"
    provider = ${?AI_PROVIDER}
    apiKey = ""
    apiKey = ${?AI_API_KEY}
    model = "claude-sonnet-4-20250514"
    model = ${?AI_MODEL}
}
